<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Window Maker — 커버 생성기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/galmuri/dist/galmuri.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
<style>
  @font-face {
    font-family: 'DungGeunMo';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2107@1.1/DungGeunMo.woff') format('woff');
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:none; }
  html,body { min-height:100%; font-family:'Galmuri11', sans-serif; background:#EFE9DD; color:#5E6E72; }
  .app { display:flex; flex-wrap:wrap; gap:24px; padding:24px; max-width:1200px; margin:0 auto; align-items:flex-start; }
  .preview-col { flex:1 1 420px; display:flex; flex-direction:column; gap:12px; align-items:center; position:sticky; top:24px; align-self:flex-start; max-height:calc(100vh - 48px); }
  .control-col { flex:1 1 360px; display:flex; flex-direction:column; gap:14px; }
  h1 { font-family:'Galmuri9', sans-serif; font-size:18px; letter-spacing:2px; text-align:center; color:#5E6E72; text-shadow:1px 1px 0 #fff; }
  .cover-wrap { width:100%; max-width:480px; border:2px dashed #BFC9C5; border-radius:14px; padding:14px; background:#fff; display:flex; justify-content:center; }
  .cover-wrap #cover{ width:100%; }
  #cover {
    position:relative; width:100%; aspect-ratio:16/9; overflow:hidden; border-radius:8px;
    font-family:var(--font-main,'Galmuri11'),sans-serif;
    background-color:var(--sky-bottom);
    background-image:var(--bg-image,linear-gradient(180deg,var(--sky-top) 0%,var(--sky-mid) 35%,var(--sky-bottom) 100%));
    background-size:cover; background-position:center;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.5cqw;
    container-type:inline-size; container-name:cover;
  }
  .fade-overlay { position:absolute; inset:0; pointer-events:none; z-index:5; background:radial-gradient(ellipse at center,rgba(255,255,255,0) 45%,rgba(120,110,95,0.20) 100%); opacity:0.5; mix-blend-mode:multiply; }
  .bubble{position:absolute;bottom:-40px;border-radius:50%;background:var(--bubble-bg);border:2px solid var(--bubble-border);animation:rise linear infinite;z-index:1;}
  @keyframes rise{0%{transform:translateY(0) translateX(0);opacity:0}10%{opacity:.8}100%{transform:translateY(-110%) translateX(20px);opacity:0}}
  .eden-title{position:relative;z-index:6;text-align:center;color:var(--text);text-shadow:2px 2px 0 rgba(255,255,255,.5);}
  .eden-title .en{font-family:'Galmuri9',sans-serif;font-size:clamp(12px,3.4cqw,24px);letter-spacing:3px;}
  .eden-title .kr{margin-top:0.4cqw;font-size:clamp(7px,1.3cqw,11px);letter-spacing:2px;color:var(--text-soft);}
  .win98{position:relative;z-index:6;width:48%;max-width:260px;background:var(--base);border:3px solid var(--accent);border-radius:18px;box-shadow:0 6px 0 var(--win98-shadow1),0 0 0 5px var(--base-light),0 0 0 8px var(--accent);overflow:hidden;}
  .title-bar{display:flex;align-items:center;justify-content:space-between;padding:1.2cqw 2cqw;background:linear-gradient(120deg,var(--accent-light) 0%,var(--accent) 100%);color:#F8F5EE;font-family:'Galmuri9',sans-serif;font-size:clamp(8px,1.7cqw,11px);letter-spacing:1px;text-shadow:1px 1px 0 rgba(80,90,90,.35);}
  .title-buttons{display:flex;gap:4px;}
  .title-buttons span{display:inline-flex;align-items:center;justify-content:center;width:16px;height:14px;background:var(--base);color:var(--accent);border-radius:5px;font-size:9px;}
  .win98-body{padding:1.6cqw;display:flex;flex-direction:column;gap:1.2cqw;}
  .photo-frame{width:100%;aspect-ratio:2/1;border-radius:12px;border:3px dashed var(--accent-base);background-color:#E8E2D5;background-image:var(--photo,none);background-size:cover;background-position:center;position:relative;overflow:hidden;}
  .photo-frame.fx-faded{filter:sepia(35%) saturate(70%) brightness(1.05) contrast(95%);}
  .photo-frame.fx-glitch::before,.photo-frame.fx-glitch::after{content:"";position:absolute;inset:0;background-image:inherit;background-size:cover;background-position:center;mix-blend-mode:screen;}
  .photo-frame.fx-glitch::before{background-color:rgba(255,0,90,.35);animation:glitch1 2.6s infinite linear;}
  .photo-frame.fx-glitch::after{background-color:rgba(0,210,255,.3);animation:glitch2 2.6s infinite linear;}
  .photo-frame.fx-glitch>.scan{position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(to bottom,rgba(255,255,255,.08) 0px,rgba(255,255,255,.08) 1px,transparent 2px,transparent 4px);animation:scan-move 6s linear infinite;mix-blend-mode:overlay;}
  @keyframes scan-move{from{background-position:0 0;}to{background-position:0 60px;}}
  @keyframes glitch1{0%,88%,100%{transform:translate(0,0);opacity:0}90%{transform:translate(-4px,2px);opacity:.5}93%{transform:translate(3px,-1px);opacity:.4}96%{transform:translate(-2px,1px);opacity:.5}}
  @keyframes glitch2{0%,84%,100%{transform:translate(0,0);opacity:0}86%{transform:translate(4px,-2px);opacity:.45}90%{transform:translate(-3px,1px);opacity:.4}94%{transform:translate(2px,2px);opacity:.5}}
  .desc-box{background:var(--base-lighter);border:2px solid var(--accent-light);border-radius:10px;padding:0.8cqw 1.4cqw;font-size:clamp(7px,1.3cqw,11px);line-height:1.4;color:var(--text);text-align:center;}
  .enter-btn{width:100%;padding:1.5cqw;font-family:var(--font-main,'Galmuri11'),sans-serif;font-size:clamp(9px,1.9cqw,14px);color:var(--text);background:var(--base-accent);border:2px solid var(--accent);border-radius:12px;cursor:pointer;box-shadow:inset 2px 2px 0 #fff,inset -2px -2px 0 var(--btn-shadow),0 4px 0 var(--accent);letter-spacing:1px;}
  .enter-btn:active{transform:translateY(3px);box-shadow:inset 2px 2px 0 #fff,inset -2px -2px 0 var(--btn-shadow);}
  .status-bar{display:flex;justify-content:space-between;padding:0.8cqw 1.6cqw;font-family:'Galmuri9',sans-serif;font-size:clamp(7px,1.3cqw,9px);color:var(--text-base);background:var(--base-darker);border-top:2px dashed var(--accent-light);}
  .taskbar{position:absolute;left:0;right:0;bottom:0;height:34px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:linear-gradient(180deg,var(--accent-base-soft) 0%,var(--accent) 100%);border-top:3px solid var(--base);font-family:'Galmuri9',sans-serif;font-size:10px;color:#fff;z-index:6;}
  .taskbar .start-btn{display:flex;align-items:center;gap:6px;background:var(--base);color:var(--text);border:2px solid var(--accent);border-radius:10px;padding:4px 10px;}
  .taskbar .clock{background:var(--base);color:var(--text);border:2px solid var(--accent);border-radius:8px;padding:4px 8px;}
  .float-win{position:absolute;width:32%;max-width:130px;background:var(--base);border:3px solid var(--accent);border-radius:14px;box-shadow:0 6px 0 var(--win98-shadow1),0 0 0 4px var(--base-light),0 0 0 7px var(--accent);overflow:hidden;z-index:7;cursor:grab;opacity:0;transform:scale(.85);transition:opacity .35s ease,transform .35s ease;}
  #cover.windows-open .float-win{opacity:1;transform:scale(1);}
  .float-win.dragging{cursor:grabbing;transition:none;}
  .float-win .title-bar{font-size:8px;padding:3px 6px;cursor:grab;}
  .float-win .float-photo{width:100%;aspect-ratio:4/3;background-color:#E8E2D5;background-image:var(--fphoto,none);background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--text-soft);text-align:center;padding:5px;font-family:'Galmuri9',sans-serif;}
  .float-win input[type=file]{display:none;}
  .close-x{display:inline-flex;align-items:center;justify-content:center;width:16px;height:14px;background:var(--base);color:var(--accent);border-radius:5px;font-size:9px;cursor:pointer;}
  .fake-cursor{position:absolute;z-index:20;pointer-events:none;width:22px;height:22px;left:0;top:0;opacity:0;transition:left var(--cursor-speed,1150ms) cubic-bezier(.4,.0,.2,1),top var(--cursor-speed,1150ms) cubic-bezier(.4,.0,.2,1),opacity .3s ease;filter:drop-shadow(1px 2px 1px rgba(0,0,0,.35));}
  .fake-cursor.show{opacity:1;}
  .fake-cursor.click svg .pointer{transform-origin:4px 2px;animation:cursor-click .35s ease;}
  @keyframes cursor-click{0%{transform:scale(1);}40%{transform:scale(.82);}100%{transform:scale(1);}}
  .panel{background:#F8F5EE;border:2px solid #BFC9C5;border-radius:12px;padding:12px;}
  .panel h2{font-family:'Galmuri9',sans-serif;font-size:11px;letter-spacing:1px;color:#7C8A86;margin-bottom:8px;border-bottom:2px dashed #E0DACE;padding-bottom:6px;}
  .row{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
  .row label{flex:0 0 86px;font-size:11px;color:#5E6E72;}
  .row input[type=text],.row textarea,.row select{flex:1;min-width:90px;font-family:inherit;font-size:11px;padding:6px 8px;border:2px solid #BFC9C5;border-radius:8px;background:#fff;color:#5E6E72;}
  .row textarea{resize:vertical;min-height:32px;}
  .row input[type=color]{width:34px;height:28px;border:2px solid #BFC9C5;border-radius:6px;padding:0;background:#fff;}
  .row input[type=file]{flex:1;font-size:10px;}
  .check{display:flex;align-items:center;gap:6px;font-size:11px;}
  .bg-presets{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px;}
  .bg-presets .preset{height:36px;border-radius:8px;border:2px solid #BFC9C5;cursor:pointer;}
  .bg-presets .preset.active{border-color:#8A9A9C;box-shadow:0 0 0 2px #8A9A9C inset;}
  .export-btn{width:100%;padding:12px;margin-bottom:8px;font-family:'Galmuri11',sans-serif;font-size:13px;background:#EAE5D8;border:2px solid #8A9A9C;border-radius:12px;cursor:pointer;color:#5E6E72;box-shadow:inset 2px 2px 0 #fff,inset -2px -2px 0 rgba(138,154,156,.25),0 4px 0 #8A9A9C;}
  .export-btn:active{transform:translateY(4px);box-shadow:none;}
  .export-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none;}
  .export-status{font-size:10px;color:#A4ADA8;text-align:center;min-height:14px;}
  .progress-bar{width:100%;height:8px;background:#E0DACE;border-radius:4px;margin-bottom:6px;display:none;overflow:hidden;}
  .progress-bar .fill{height:100%;background:#8A9A9C;border-radius:4px;width:0%;transition:width 0.15s;}
  @media(max-width:860px){
    .app{flex-direction:column;}
    .preview-col,.control-col{flex:1 1 auto;width:100%;}
    .preview-col{top:8px;max-height:calc(100vh - 16px);padding-bottom:4px;background:#EFE9DD;z-index:30;overflow:hidden;}
    .cover-wrap{max-width:min(480px,calc((100vh - 100px) * 1.778));}
  }
</style>
</head>
<body>
<div class="app">
  <div class="preview-col">
    <h1>Window Maker — 커버 생성기</h1>
    <div class="cover-wrap">
      <div id="cover" style="--sky-top:#DCE8E6;--sky-mid:#C7DBDC;--sky-bottom:#A6C0CA;--base:#F3EFE6;--accent:#8A9A9C;--text:#5E6E72;--font-main:'Galmuri11';--base-light:#F6F3EB;--base-lighter:#F4F1E8;--base-darker:#E9E5DA;--accent-light:#D5DCDC;--accent-base:#BCC8C5;--accent-base-soft:#DCE2E0;--base-accent:#EDE7DA;--text-base:#79868A;--text-soft:#86948F;--bubble-bg:rgba(243,239,230,0.6);--bubble-border:rgba(243,239,230,0.8);--win98-shadow1:rgba(138,154,156,0.3);--btn-shadow:rgba(138,154,156,0.25);">
        <div class="fade-overlay"></div>
        <div class="bubble" style="left:8%;width:14px;height:14px;animation-duration:9s;animation-delay:0s;"></div>
        <div class="bubble" style="left:20%;width:10px;height:10px;animation-duration:7s;animation-delay:1.5s;"></div>
        <div class="bubble" style="left:35%;width:18px;height:18px;animation-duration:11s;animation-delay:3s;"></div>
        <div class="bubble" style="left:55%;width:12px;height:12px;animation-duration:8s;animation-delay:0.5s;"></div>
        <div class="bubble" style="left:70%;width:16px;height:16px;animation-duration:10s;animation-delay:2s;"></div>
        <div class="bubble" style="left:85%;width:11px;height:11px;animation-duration:9s;animation-delay:4s;"></div>
        <div class="bubble" style="left:92%;width:8px;height:8px;animation-duration:6s;animation-delay:1s;"></div>
        <div class="eden-title">
          <div class="en" id="title-en">Our Faded Eden</div>
          <div class="kr" id="title-kr">— 우리의 빛바랜 낙원 —</div>
        </div>
        <div class="win98">
          <div class="title-bar">
            <div class="title-left"><span id="win-icon">🐚</span> <span id="win-title">Faded Eden</span></div>
            <div class="title-buttons"><span>_</span><span>□</span><span>x</span></div>
          </div>
          <div class="win98-body">
            <div class="photo-frame fx-faded" id="photo-frame"><div class="scan"></div></div>
            <div class="desc-box" id="desc-text">...빛이 점점 흐려집니다...<br>오래된 낙원으로 가라앉을까요?</div>
            <button class="enter-btn" id="btn-text">심해에 잠기시겠습니까?</button>
          </div>
          <div class="status-bar"><span id="status-left">● 준비됨</span><span id="status-right">faded 100%</span></div>
        </div>
        <div id="float-wins"></div>
        <div class="fake-cursor" id="fake-cursor">
          <svg class="pointer" width="22" height="22" viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 1 L4 18 L8.2 14.2 L11 20.5 L14 19 L11.2 12.7 L17 12.5 Z" fill="#ffffff" stroke="#5E6E72" stroke-width="1.4" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="taskbar">
          <div class="start-btn" id="taskbar-text">🌊 시작</div>
          <div class="clock" id="clock">00:00</div>
        </div>
      </div>
    </div>
  </div>

  <div class="control-col">
    <div class="panel">
      <h2>🖼 배경</h2>
      <div class="bg-presets" id="bg-presets"></div>
      <div class="row"><label>직접 업로드</label><input type="file" id="bg-input" accept="image/*"></div>
      <div class="row" style="margin-top:4px;"><label>그라디언트</label><input type="color" id="c-sky-top" value="#DCE8E6"><input type="color" id="c-sky-bottom" value="#A6C0CA"></div>
    </div>
    <div class="panel">
      <h2>📷 메인 사진 / 효과</h2>
      <div class="row"><label>이미지</label><input type="file" id="photo-input" accept="image/*"></div>
      <div class="check"><input type="checkbox" id="fx-faded" checked> <label for="fx-faded">빛바램 효과 (세피아)</label></div>
      <div class="check" style="margin-top:6px;"><input type="checkbox" id="fx-glitch"> <label for="fx-glitch">글리치 효과</label></div>
    </div>
    <div class="panel">
      <h2>🔤 글씨체</h2>
      <div class="row"><label>폰트</label>
        <select id="font-select">
          <option value="'Galmuri11'" selected>Galmuri11 (둥근 도트)</option>
          <option value="'Galmuri9'">Galmuri9 (작은 도트)</option>
          <option value="'Galmuri7'">Galmuri7 (작은 사각 도트)</option>
          <option value="'DungGeunMo'">DungGeunMo (둥근모꼴)</option>
        </select>
      </div>
    </div>
    <div class="panel">
      <h2>📝 문구</h2>
      <div class="row"><label>상단 영문</label><input type="text" id="t-title-en" value="Our Faded Eden"></div>
      <div class="row"><label>상단 한글</label><input type="text" id="t-title-kr" value="— 우리의 빛바랜 낙원 —"></div>
      <div class="row"><label>창 제목</label><input type="text" id="t-win-title" value="Faded Eden"></div>
      <div class="row"><label>설명 문구</label><textarea id="t-desc">...빛이 점점 흐려집니다...
오래된 낙원으로 가라앉을까요?</textarea></div>
      <div class="row"><label>버튼 문구</label><input type="text" id="t-btn" value="심해에 잠기시겠습니까?"></div>
      <div class="row"><label>작업표시줄</label><input type="text" id="t-taskbar" value="🌊 시작"></div>
      <div class="row"><label>상태표시줄</label><input type="text" id="t-status-l" value="● 준비됨"><input type="text" id="t-status-r" value="faded 100%"></div>
    </div>
    <div class="panel">
      <h2>🪟 떠다니는 사진 창</h2>
      <div class="row"><label>창 개수</label>
        <select id="win-count">
          <option value="1">1개</option>
          <option value="2" selected>2개</option>
          <option value="3">3개</option>
          <option value="4">4개</option>
        </select>
      </div>
      <div class="check"><input type="checkbox" id="auto-open"> <label for="auto-open">미리보기에서 항상 열어두기</label></div>
      <div class="row"><label>커서 속도</label>
        <select id="cursor-speed">
          <option value="2200">아주 느리게</option>
          <option value="1600">느리게</option>
          <option value="1150" selected>보통</option>
          <option value="700">빠르게</option>
          <option value="350">아주 빠르게</option>
        </select>
      </div>
      <button class="export-btn" id="replay-anim" style="margin-top:6px;">▶ 애니메이션 다시 재생</button>
      <div class="export-status" id="win-hint">입장 버튼을 누르면 창이 나타납니다. 각 창을 클릭해 사진을 넣고, 드래그해서 옮길 수 있어요.</div>
    </div>
    <div class="panel">
      <h2>🎨 색상</h2>
      <div class="row"><label>창 배경</label><input type="color" id="c-base" value="#F3EFE6"></div>
      <div class="row"><label>테두리</label><input type="color" id="c-accent" value="#8A9A9C"></div>
      <div class="row"><label>글자색</label><input type="color" id="c-text" value="#5E6E72"></div>
    </div>
    <div class="panel">
      <h2>💾 내보내기 — 항상 1280×720</h2>
      <button class="export-btn" id="export-png">📷 PNG로 저장</button>
      <button class="export-btn" id="export-gif">🎞 GIF로 저장 (버블 애니메이션)</button>
      <div class="progress-bar" id="progress-bar"><div class="fill" id="progress-fill"></div></div>
      <div class="export-status" id="export-status">모바일/PC 관계없이 정확한 16:9로 저장됩니다</div>
    </div>
  </div>
</div>

<script>
const cover = document.getElementById('cover');

// ── 상태 ─────────────────────────────────────────────────────
const state = {
  titleEn:'Our Faded Eden', titleKr:'— 우리의 빛바랜 낙원 —',
  winTitle:'Faded Eden', winIcon:'🐚',
  desc:'...빛이 점점 흐려집니다...\n오래된 낙원으로 가라앉을까요?',
  btnText:'심해에 잠기시겠습니까?', taskbar:'🌊 시작',
  statusL:'● 준비됨', statusR:'faded 100%',
  skyTop:'#DCE8E6', skyBottom:'#A6C0CA',
  base:'#F3EFE6', accent:'#8A9A9C', text:'#5E6E72',
  bgImage:null, photoImage:null,
  fxFaded:true, fxGlitch:false,
  font:"'Galmuri11'",
  floatPhotos:[], floatPositions:[], floatCount:2,
};

// ── 유틸 ──────────────────────────────────────────────────────
function toDataURL(file,cb){ const r=new FileReader(); r.onload=()=>cb(r.result); r.readAsDataURL(file); }
function loadImage(src){ return new Promise((res,rej)=>{ const i=new Image(); i.crossOrigin='anonymous'; i.onload=()=>res(i); i.onerror=rej; i.src=src; }); }
function mixHex(a,b,t){
  const pa=parseInt(a.slice(1),16),pb=parseInt(b.slice(1),16);
  const ar=(pa>>16)&255,ag=(pa>>8)&255,ab=pa&255,br=(pb>>16)&255,bg=(pb>>8)&255,bb=pb&255;
  return '#'+[Math.round(ar+(br-ar)*t),Math.round(ag+(bg-ag)*t),Math.round(ab+(bb-ab)*t)].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function hexRgb(h){ const v=parseInt(h.slice(1),16); return `${(v>>16)&255},${(v>>8)&255},${v&255}`; }
function getCS(p){ return getComputedStyle(cover).getPropertyValue(p).trim(); }
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

// ── 메인 사진 ─────────────────────────────────────────────────

const presets=[
  {name:'바다 새벽',top:'#DCE8E6',bottom:'#A6C0CA'},{name:'노을',top:'#FCE3D6',bottom:'#E89B8C'},
  {name:'심해',top:'#A9C3CE',bottom:'#3F5C6B'},{name:'밤하늘',top:'#5A6B8C',bottom:'#1F2740'},
  {name:'안개',top:'#E8E5DD',bottom:'#C9C4B7'},{name:'봄날',top:'#E9F2D8',bottom:'#BFD9A8'},
  {name:'세피아',top:'#F1E6D2',bottom:'#C9AE8C'},{name:'라벤더',top:'#E6E0F2',bottom:'#B7A6D9'},
];
const presetWrap=document.getElementById('bg-presets');
presets.forEach((p,i)=>{
  const d=document.createElement('div');
  d.className='preset'+(i===0?' active':'');
  d.style.background=`linear-gradient(180deg,${p.top},${p.bottom})`;
  d.title=p.name;
  d.onclick=()=>{
    document.querySelectorAll('.preset').forEach(el=>el.classList.remove('active'));
    d.classList.add('active');
    document.getElementById('c-sky-top').value=p.top;
    document.getElementById('c-sky-bottom').value=p.bottom;
    state.skyTop=p.top; state.skyBottom=p.bottom; state.bgImage=null;
    cover.style.removeProperty('--bg-image');
    cover.style.setProperty('--sky-top',p.top);
    cover.style.setProperty('--sky-bottom',p.bottom);
    cover.style.setProperty('--sky-mid',mixHex(p.top,p.bottom,0.5));
    updateDerived();
  };
  presetWrap.appendChild(d);
});
document.getElementById('bg-input').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f) return;

['c-sky-top','c-sky-bottom'].forEach(id=>{

});

function updateDerived(){
  const {base,accent,text}=state;
  cover.style.setProperty('--base-light',mixHex(base,'#ffffff',0.1));
  cover.style.setProperty('--base-lighter',mixHex(base,'#ffffff',0.04));
  cover.style.setProperty('--base-darker',mixHex(base,'#000000',0.04));
  cover.style.setProperty('--accent-light',mixHex(accent,'#ffffff',0.65));
  cover.style.setProperty('--accent-base',mixHex(accent,base,0.5));
  cover.style.setProperty('--accent-base-soft',mixHex(accent,base,0.75));
  cover.style.setProperty('--base-accent',mixHex(base,accent,0.1));
  cover.style.setProperty('--text-base',mixHex(text,base,0.4));
  cover.style.setProperty('--text-soft',mixHex(text,base,0.3));
  cover.style.setProperty('--bubble-bg',`rgba(${hexRgb(base)},0.6)`);
  cover.style.setProperty('--bubble-border',`rgba(${hexRgb(base)},0.8)`);
  cover.style.setProperty('--win98-shadow1',`rgba(${hexRgb(accent)},0.3)`);
  cover.style.setProperty('--btn-shadow',`rgba(${hexRgb(accent)},0.25)`);
}

// ── 플로팅 창 ────────────────────────────────────────────────
const floatWinsWrap=document.getElementById('float-wins');
let floatWins=[];
const SLOTS=[{x:2,y:5},{x:64,y:5},{x:2,y:46},{x:64,y:46}];
function randPos(i){ const s=SLOTS[i%SLOTS.length]; return {x:s.x+(Math.random()*4-2),y:s.y+(Math.random()*4-2)}; }

function buildFloatWindows(){
  floatWinsWrap.innerHTML=''; floatWins=[];
  while(state.floatPhotos.length<state.floatCount) state.floatPhotos.push(null);
  while(state.floatPositions.length<state.floatCount) state.floatPositions.push(randPos(state.floatPositions.length));
  const titles=['Memory.jpg','Snapshot.png','Untitled','Picture'];
  for(let i=0;i<state.floatCount;i++){
    const win=document.createElement('div'); win.className='float-win';
    const pos=state.floatPositions[i];
    win.style.left=pos.x+'%'; win.style.top=pos.y+'%';
    win.innerHTML=`<div class="title-bar"><div class="title-left">🖼 <span>${titles[i%titles.length]}</span></div><div class="title-buttons"><span class="close-x">x</span></div></div><label class="float-photo">사진을 넣어주세요<input type="file" accept="image/*"></label>`;
    floatWinsWrap.appendChild(win);
    const photoEl=win.querySelector('.float-photo');
    if(state.floatPhotos[i]){ win.style.setProperty('--fphoto',`url("${state.floatPhotos[i]}")`); photoEl.textContent=''; }
    win.querySelector('input[type=file]').addEventListener('change',((idx)=>e=>{
      const f=e.target.files[0]; if(!f) return;
      toDataURL(f,url=>{ state.floatPhotos[idx]=url; win.style.setProperty('--fphoto',`url("${url}")`); photoEl.textContent=''; });
    })(i));
    win.querySelector('.close-x').addEventListener('click',ev=>{ ev.stopPropagation(); win.remove(); floatWins=floatWins.filter(w=>w.el!==win); });
    makeDraggable(win,i);
    floatWins.push({el:win,idx:i});
  }
}
function makeDraggable(win,idx){
  const tb=win.querySelector('.title-bar');
  let dragging=false,sx,sy,sl,st;
  const down=e=>{ if(e.target.closest('.close-x')) return; dragging=true; win.classList.add('dragging'); const pt=e.touches?e.touches[0]:e; sx=pt.clientX; sy=pt.clientY; const r=win.getBoundingClientRect(),pr=cover.getBoundingClientRect(); sl=r.left-pr.left; st=r.top-pr.top; e.preventDefault(); };
  const move=e=>{ if(!dragging) return; const pt=e.touches?e.touches[0]:e; const pr=cover.getBoundingClientRect(); const nx=(sl+pt.clientX-sx)/pr.width*100, ny=(st+pt.clientY-sy)/pr.height*100; win.style.left=nx+'%'; win.style.top=ny+'%'; if(state.floatPositions[idx]){state.floatPositions[idx].x=nx;state.floatPositions[idx].y=ny;} };
  const up=()=>{ dragging=false; win.classList.remove('dragging'); };
  tb.addEventListener('mousedown',down); tb.addEventListener('touchstart',down,{passive:false});
  window.addEventListener('mousemove',move); window.addEventListener('touchmove',move,{passive:false});
  window.addEventListener('mouseup',up); window.addEventListener('touchend',up);
}

// ── 커서 애니메이션 ───────────────────────────────────────────
const fakeCursor=document.getElementById('fake-cursor');
function getCursorSpeed(){ return parseInt(document.getElementById('cursor-speed').value,10)||1150; }
function cursorMoveTo(x,y){ return new Promise(r=>{ const sp=getCursorSpeed(); fakeCursor.style.setProperty('--cursor-speed',sp+'ms'); fakeCursor.classList.add('show'); fakeCursor.style.left=x+'%'; fakeCursor.style.top=y+'%'; setTimeout(r,sp); }); }
function cursorClick(){ return new Promise(r=>{ fakeCursor.classList.add('click'); setTimeout(()=>{ fakeCursor.classList.remove('click'); r(); },380); }); }
function elPct(el){ const r=el.getBoundingClientRect(),pr=cover.getBoundingClientRect(); return {x:(r.left+r.width/2-pr.left)/pr.width*100,y:(r.top+r.height/2-pr.top)/pr.height*100}; }

let demoRunning=false;
async function runEnterAnimation(){
  if(demoRunning) return; demoRunning=true;
  const btn=document.getElementById('btn-text');
  const t=elPct(btn);
  await wait(400); await cursorMoveTo(t.x,t.y-1); await cursorClick();
  if(floatWinsWrap.children.length===0) buildFloatWindows();
  cover.classList.add('windows-open');
  await wait(250);
  for(const w of floatWins){ const c=elPct(w.el.querySelector('.float-photo')); await cursorMoveTo(c.x,c.y); await cursorClick(); await wait(150); }
  await wait(300); fakeCursor.classList.remove('show'); demoRunning=false;
}
runEnterAnimation();
document.getElementById('replay-anim').addEventListener('click',()=>{ cover.classList.remove('windows-open'); demoRunning=false; runEnterAnimation(); });
document.getElementById('btn-text').addEventListener('click',()=>{ if(cover.classList.contains('windows-open')){ cover.classList.remove('windows-open'); } else { demoRunning=false; runEnterAnimation(); } });
document.getElementById('win-count').addEventListener('change',e=>{ state.floatCount=parseInt(e.target.value,10); state.floatPositions=[]; buildFloatWindows(); if(document.getElementById('auto-open').checked||cover.classList.contains('windows-open')) cover.classList.add('windows-open'); });
document.getElementById('auto-open').addEventListener('change',e=>{ if(e.target.checked){ if(!floatWinsWrap.children.length) buildFloatWindows(); cover.classList.add('windows-open'); } else cover.classList.remove('windows-open'); });

// ═══════════════════════════════════════════════════════════════
//  Canvas 렌더러 — html2canvas 완전 대체, 항상 1280×720
// ═══════════════════════════════════════════════════════════════
const EW=1280, EH=720;

const BUBBLE_DEFS=[
  {left:0.08,size:14,dur:9,delay:0},{left:0.20,size:10,dur:7,delay:1.5},
  {left:0.35,size:18,dur:11,delay:3},{left:0.55,size:12,dur:8,delay:0.5},
  {left:0.70,size:16,dur:10,delay:2},{left:0.85,size:11,dur:9,delay:4},
  {left:0.92,size:8,dur:6,delay:1},
];

function rr(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

async function renderFrame(canvas, animT){
  canvas.width=EW; canvas.height=EH;
  const ctx=canvas.getContext('2d');
  const s=state;
  const base=s.base, accent=s.accent, textCol=s.text;
  const accentLight=mixHex(accent,'#ffffff',0.65);
  const baseDarker=mixHex(base,'#000000',0.04);
  const accentBase=mixHex(accent,base,0.5);
  const baseAccent=mixHex(base,accent,0.1);
  const textBase=mixHex(textCol,base,0.4);
  const textSoft=mixHex(textCol,base,0.3);
  const baseLight=mixHex(base,'#ffffff',0.1);
  const baseLighter=mixHex(base,'#ffffff',0.04);
  const accentBaseSoft=mixHex(accent,base,0.75);
  const skyMid=mixHex(s.skyTop,s.skyBottom,0.5);

  ctx.save(); ctx.beginPath(); ctx.rect(0,0,EW,EH); ctx.clip();

  // 배경
  if(s.bgImage){
    try{ const img=await loadImage(s.bgImage); const sc=Math.max(EW/img.naturalWidth,EH/img.naturalHeight); const dw=img.naturalWidth*sc,dh=img.naturalHeight*sc; ctx.drawImage(img,(EW-dw)/2,(EH-dh)/2,dw,dh); }
    catch(e){ const g=ctx.createLinearGradient(0,0,0,EH); g.addColorStop(0,s.skyTop); g.addColorStop(0.35,skyMid); g.addColorStop(1,s.skyBottom); ctx.fillStyle=g; ctx.fillRect(0,0,EW,EH); }
  } else {
    const g=ctx.createLinearGradient(0,0,0,EH); g.addColorStop(0,s.skyTop); g.addColorStop(0.35,skyMid); g.addColorStop(1,s.skyBottom); ctx.fillStyle=g; ctx.fillRect(0,0,EW,EH);
  }

  // 버블 애니메이션
  BUBBLE_DEFS.forEach(b=>{
    const phase=((animT-b.delay/b.dur)%1+1)%1;
    let alpha=0.8;
    if(phase<0.1) alpha=phase/0.1*0.8;
    else if(phase>0.9) alpha=(1-phase)/0.1*0.8;
    const bx=b.left*EW, by=EH*(1-phase*1.1)+40, r=b.size/2;
    ctx.save(); ctx.globalAlpha=alpha;
    ctx.beginPath(); ctx.arc(bx,by,r,0,Math.PI*2);
    ctx.fillStyle=`rgba(${hexRgb(base)},0.6)`; ctx.fill();
    ctx.strokeStyle=`rgba(${hexRgb(base)},0.8)`; ctx.lineWidth=2; ctx.stroke();
    ctx.restore();
  });

  // 타이틀
  const font=s.font.replace(/'/g,'');
  ctx.textAlign='center';
  ctx.fillStyle=textCol;
  ctx.font=`bold 38px '${font}',sans-serif`;
  ctx.shadowColor='rgba(255,255,255,0.5)'; ctx.shadowOffsetX=2; ctx.shadowOffsetY=2;
  ctx.fillText(s.titleEn,EW/2,EH*0.21);
  ctx.shadowColor='transparent';
  ctx.font=`13px '${font}',sans-serif`; ctx.fillStyle=textSoft;
  ctx.fillText(s.titleKr,EW/2,EH*0.21+24);

  // 메인 윈도우
  const wW=Math.min(EW*0.38,320), wH=wW*0.88;
  const wX=(EW-wW)/2, wY=EH*0.30;

  // 그림자+테두리 레이어
  ctx.save(); ctx.shadowColor=`rgba(${hexRgb(accent)},0.3)`; ctx.shadowBlur=0; ctx.shadowOffsetY=6;
  rr(ctx,wX,wY,wW,wH,18); ctx.fillStyle=base; ctx.fill(); ctx.restore();
  rr(ctx,wX-8,wY-8,wW+16,wH+16,22); ctx.strokeStyle=accent; ctx.lineWidth=3; ctx.stroke();
  rr(ctx,wX-5,wY-5,wW+10,wH+10,20); ctx.strokeStyle=baseLight; ctx.lineWidth=5; ctx.stroke();
  rr(ctx,wX,wY,wW,wH,18); ctx.strokeStyle=accent; ctx.lineWidth=3; ctx.stroke();

  // 타이틀바
  const tbH=Math.round(wH*0.13);
  ctx.save(); ctx.beginPath();
  ctx.moveTo(wX+18,wY); ctx.lineTo(wX+wW-18,wY); ctx.arcTo(wX+wW,wY,wX+wW,wY+18,18);
  ctx.lineTo(wX+wW,wY+tbH); ctx.lineTo(wX,wY+tbH); ctx.lineTo(wX,wY+18); ctx.arcTo(wX,wY,wX+18,wY,18); ctx.closePath();
  const tg=ctx.createLinearGradient(wX,wY,wX+wW,wY+tbH);
  tg.addColorStop(0,accentLight); tg.addColorStop(1,accent);
  ctx.fillStyle=tg; ctx.fill(); ctx.restore();
  const tfs=Math.max(9,tbH*0.45);
  ctx.fillStyle='#F8F5EE'; ctx.font=`${tfs}px 'Galmuri9',sans-serif`; ctx.textAlign='left';
  ctx.shadowColor='rgba(80,90,90,0.35)'; ctx.shadowOffsetX=1; ctx.shadowOffsetY=1;
  ctx.fillText(`${s.winIcon} ${s.winTitle}`,wX+12,wY+tbH*0.68); ctx.shadowColor='transparent';
  // 창 버튼들
  ['x','□','_'].forEach((l,bi)=>{
    const bsz=Math.max(10,tbH*0.55), bx=wX+wW-5-(bi+1)*(bsz+4), by=wY+(tbH-bsz)/2;
    rr(ctx,bx,by,bsz,bsz,3); ctx.fillStyle=base; ctx.fill();
    ctx.fillStyle=accent; ctx.font=`${bsz*0.55}px sans-serif`; ctx.textAlign='center';
    ctx.fillText(l,bx+bsz/2,by+bsz*0.72);
  });

  // 바디
  const bY=wY+tbH, bH=wH-tbH, bp=wW*0.045;
  const pfY=bY+bp, pfW=wW-bp*2, pfH=pfW/2;

  // 사진 프레임
  ctx.save(); rr(ctx,wX+bp,pfY,pfW,pfH,12); ctx.clip();
  if(s.photoImage){
    try{
      const img=await loadImage(s.photoImage);
      if(s.fxFaded) ctx.filter='sepia(35%) saturate(70%) brightness(1.05) contrast(95%)';
      const sc=Math.max(pfW/img.naturalWidth,pfH/img.naturalHeight);
      const dw=img.naturalWidth*sc,dh=img.naturalHeight*sc;
      ctx.drawImage(img,wX+bp+(pfW-dw)/2,pfY+(pfH-dh)/2,dw,dh);
      ctx.filter='none';
    }catch(e){ ctx.fillStyle='#E8E2D5'; ctx.fillRect(wX+bp,pfY,pfW,pfH); }
  } else { ctx.fillStyle='#E8E2D5'; ctx.fillRect(wX+bp,pfY,pfW,pfH); }
  ctx.restore();
  rr(ctx,wX+bp,pfY,pfW,pfH,12); ctx.strokeStyle=accentBase; ctx.lineWidth=3; ctx.setLineDash([8,5]); ctx.stroke(); ctx.setLineDash([]);

  // 설명 박스
  const dY=pfY+pfH+bp*0.7, dH=bH*0.19;
  rr(ctx,wX+bp,dY,pfW,dH,10); ctx.fillStyle=baseLighter; ctx.fill();
  ctx.strokeStyle=accentLight; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle=textCol; ctx.textAlign='center';
  const dfs=Math.max(8,pfW*0.042);
  ctx.font=`${dfs}px '${font}',sans-serif`;
  const dLines=s.desc.split('\n'), lh=dfs*1.5, tH=(dLines.length-1)*lh;
  dLines.forEach((ln,li)=>ctx.fillText(ln,wX+bp+pfW/2,dY+dH/2-tH/2+li*lh+dfs*0.4));

  // 버튼
  const btnY=dY+dH+bp*0.5, btnH=bH*0.17;
  rr(ctx,wX+bp,btnY,pfW,btnH,12); ctx.fillStyle=baseAccent; ctx.fill();
  ctx.strokeStyle=accent; ctx.lineWidth=2; ctx.stroke();
  ctx.save(); ctx.globalAlpha=0.4; rr(ctx,wX+bp+2,btnY+2,pfW-4,btnH*0.4,10); ctx.fillStyle='#fff'; ctx.fill(); ctx.restore();
  ctx.fillStyle=textCol; ctx.font=`${Math.max(9,pfW*0.05)}px '${font}',sans-serif`; ctx.textAlign='center';
  ctx.fillText(s.btnText,wX+bp+pfW/2,btnY+btnH*0.62);

  // 상태바
  const sbY=wY+wH-bp*0.8, sbH=bp*0.8;
  ctx.save(); ctx.beginPath(); ctx.rect(wX,sbY,wW,sbH); ctx.clip();
  ctx.fillStyle=baseDarker; ctx.fillRect(wX,sbY,wW,sbH); ctx.restore();
  ctx.strokeStyle=accentLight; ctx.lineWidth=2; ctx.setLineDash([4,3]);
  ctx.beginPath(); ctx.moveTo(wX,sbY); ctx.lineTo(wX+wW,sbY); ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle=textBase; ctx.font=`${Math.max(7,sbH*0.55)}px 'Galmuri9',sans-serif`;
  ctx.textAlign='left'; ctx.fillText(s.statusL,wX+12,sbY+sbH*0.72);
  ctx.textAlign='right'; ctx.fillText(s.statusR,wX+wW-12,sbY+sbH*0.72);

  // 플로팅 창들
  const winOpen=cover.classList.contains('windows-open');
  if(winOpen){
    for(let i=0;i<s.floatCount;i++){
      const pos=s.floatPositions[i]||{x:5+i*30,y:10};
      const fwW=Math.min(EW*0.16,130), fwH=fwW*1.1;
      const fwX=pos.x/100*EW, fwY=pos.y/100*EH;
      ctx.save(); ctx.shadowColor=`rgba(${hexRgb(accent)},0.3)`; ctx.shadowOffsetY=6;
      rr(ctx,fwX,fwY,fwW,fwH,14); ctx.fillStyle=base; ctx.fill(); ctx.restore();
      rr(ctx,fwX-7,fwY-7,fwW+14,fwH+14,18); ctx.strokeStyle=accent; ctx.lineWidth=3; ctx.stroke();
      rr(ctx,fwX-4,fwY-4,fwW+8,fwH+8,16); ctx.strokeStyle=baseLight; ctx.lineWidth=4; ctx.stroke();
      rr(ctx,fwX,fwY,fwW,fwH,14); ctx.strokeStyle=accent; ctx.lineWidth=3; ctx.stroke();
      // 작은 타이틀바
      const ftbH=22;
      ctx.save(); ctx.beginPath();
      ctx.moveTo(fwX+14,fwY); ctx.lineTo(fwX+fwW-14,fwY); ctx.arcTo(fwX+fwW,fwY,fwX+fwW,fwY+14,14);
      ctx.lineTo(fwX+fwW,fwY+ftbH); ctx.lineTo(fwX,fwY+ftbH); ctx.lineTo(fwX,fwY+14); ctx.arcTo(fwX,fwY,fwX+14,fwY,14); ctx.closePath();
      const fg=ctx.createLinearGradient(fwX,fwY,fwX+fwW,fwY+ftbH); fg.addColorStop(0,accentLight); fg.addColorStop(1,accent);
      ctx.fillStyle=fg; ctx.fill(); ctx.restore();
      ctx.fillStyle='#F8F5EE'; ctx.font='8px Galmuri9,sans-serif'; ctx.textAlign='left';
      ctx.fillText('🖼 Photo',fwX+6,fwY+ftbH-6);
      rr(ctx,fwX+fwW-18,fwY+4,14,12,3); ctx.fillStyle=base; ctx.fill();
      ctx.fillStyle=accent; ctx.font='8px sans-serif'; ctx.textAlign='center';
      ctx.fillText('x',fwX+fwW-11,fwY+14);
      // 사진
      const fpY=fwY+ftbH, fpH=fwH-ftbH;
      ctx.save(); rr(ctx,fwX,fpY,fwW,fpH,0); ctx.clip();
      if(s.floatPhotos[i]){
        try{ const img=await loadImage(s.floatPhotos[i]); const sc=Math.max(fwW/img.naturalWidth,fpH/img.naturalHeight); const dw=img.naturalWidth*sc,dh=img.naturalHeight*sc; ctx.drawImage(img,fwX+(fwW-dw)/2,fpY+(fpH-dh)/2,dw,dh); }
        catch(e){ ctx.fillStyle='#E8E2D5'; ctx.fillRect(fwX,fpY,fwW,fpH); }
      } else { ctx.fillStyle='#E8E2D5'; ctx.fillRect(fwX,fpY,fwW,fpH); ctx.fillStyle=textSoft; ctx.font='7px Galmuri9,sans-serif'; ctx.textAlign='center'; ctx.fillText('사진 없음',fwX+fwW/2,fpY+fpH/2); }
      ctx.restore();
    }
  }

  // 비네트
  const vig=ctx.createRadialGradient(EW/2,EH/2,EW*0.3,EW/2,EH/2,EW*0.7);
  vig.addColorStop(0,'rgba(120,110,95,0)'); vig.addColorStop(1,'rgba(120,110,95,0.2)');
  ctx.fillStyle=vig; ctx.fillRect(0,0,EW,EH);

  // 태스크바
  const tkH=34;
  const tkg=ctx.createLinearGradient(0,EH-tkH,0,EH);
  tkg.addColorStop(0,accentBaseSoft); tkg.addColorStop(1,accent);
  ctx.fillStyle=tkg; ctx.fillRect(0,EH-tkH,EW,tkH);
  ctx.fillStyle=base; ctx.fillRect(0,EH-tkH,EW,3);
  rr(ctx,10,EH-tkH+5,76,tkH-10,10); ctx.fillStyle=base; ctx.fill(); ctx.strokeStyle=accent; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle=textCol; ctx.font=`10px '${font}',sans-serif`; ctx.textAlign='center';
  ctx.fillText(s.taskbar,48,EH-tkH+17);
  const n=new Date(), ck=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  rr(ctx,EW-58,EH-tkH+5,48,tkH-10,8); ctx.fillStyle=base; ctx.fill(); ctx.strokeStyle=accent; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle=textCol; ctx.font=`10px '${font}',sans-serif`; ctx.textAlign='center';
  ctx.fillText(ck,EW-34,EH-tkH+17);

  ctx.restore();
}

// ── PNG 내보내기 ───────────────────────────────────────────────
const statusEl=document.getElementById('export-status');
const progressBar=document.getElementById('progress-bar');
const progressFill=document.getElementById('progress-fill');

document.getElementById('export-png').onclick=async()=>{
  const btn=document.getElementById('export-png');
  btn.disabled=true; statusEl.textContent='PNG 생성 중 (1280×720)...';
  fakeCursor.classList.remove('show');
  try{
    const c=document.createElement('canvas');
    await renderFrame(c,0);
    c.toBlob(blob=>{ const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='window-maker.png'; a.click(); statusEl.textContent='✅ PNG 저장 완료! (1280×720)'; },'image/png');
  }catch(err){ statusEl.textContent='오류: '+err.message; }
  btn.disabled=false;
};

// ── GIF 내보내기 ───────────────────────────────────────────────
document.getElementById('export-gif').onclick=async()=>{
  if(typeof GIF==='undefined'){ statusEl.textContent='gif.js 로딩 실패. 새로고침 후 다시 시도해주세요.'; return; }
  const btnG=document.getElementById('export-gif'), btnP=document.getElementById('export-png');
  btnG.disabled=true; btnP.disabled=true;
  fakeCursor.classList.remove('show');
  const FRAMES=18, DELAY=120; // 약 8fps, 2.1초 루프
  progressBar.style.display='block'; progressFill.style.width='0%';
  const gif=new GIF({workers:4,quality:10,width:EW,height:EH,workerScript:'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js.worker.js'});
  try{
    for(let i=0;i<FRAMES;i++){
      statusEl.textContent=`프레임 생성 중... ${i+1}/${FRAMES}`;
      progressFill.style.width=((i/FRAMES)*70)+'%';
      const c=document.createElement('canvas');
      await renderFrame(c,i/FRAMES);
      gif.addFrame(c,{delay:DELAY,copy:true});
      await new Promise(r=>setTimeout(r,0)); // 브라우저 숨 쉬기
    }
    statusEl.textContent='GIF 인코딩 중...'; progressFill.style.width='75%';
    gif.on('progress',p=>{ progressFill.style.width=(75+p*25)+'%'; });
    gif.on('finished',blob=>{
      const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='window-maker.gif'; a.click();
      statusEl.textContent=`✅ GIF 저장 완료! (1280×720, ${FRAMES}프레임)`;
      progressFill.style.width='100%';
      setTimeout(()=>{ progressBar.style.display='none'; },2000);
      btnG.disabled=false; btnP.disabled=false;
    });
    gif.render();
  }catch(err){
    statusEl.textContent='오류: '+err.message;
    btnG.disabled=false; btnP.disabled=false; progressBar.style.display='none';
  }
};
</script>
